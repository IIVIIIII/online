<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piezo Earring</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F5F5F5;
      color: #111;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    .nav {
      padding: 26px 48px;
      border-bottom: 1px solid #d9d9d9;
      flex-shrink: 0;
    }

    .nav a {
      color: #444;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav a:hover { color: #111; }

    /* ── MAIN CONTENT ── */
    .content {
      display: grid;
      grid-template-columns: 8fr 9fr;
      grid-template-rows: 1fr;
      gap: 0;
      flex: 1;
      min-height: 0;
      padding: 0 46px 46px;
    }

    /* ── SLIDESHOW ── */
    .slideshow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding-right: 48px;
      border-right: 1px solid #d9d9d9;
      padding-top: 38px;
      min-height: 0;
      overflow: hidden;
    }

    .title-portrait { display: none; }

    .video-container {
      position: relative;
      background: transparent;
      flex: 1;
      min-height: 0;
      max-width: 100%;
      aspect-ratio: 1 / 1;
    }

    .video-container video,
    .video-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .video-container .media-hidden { display: none; }

    .slide-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .slide-btn {
      background: none;
      border: 1px solid #888;
      color: #111;
      padding: 8px 20px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: Arial, sans-serif;
      transition: border-color 0.2s;
    }

    .slide-btn:hover:not(:disabled) { border-color: #111; }
    .slide-btn:disabled { opacity: 0.2; cursor: default; }

    .slide-counter {
      font-size: 12px;
      letter-spacing: 0.15em;
      color: #555;
    }

    .slide-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #999;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active { background: #111; }

    /* ── CAPTION PANEL ── */
    .caption-panel {
      padding: 48px 0 48px 88px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .caption-scroll-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .caption-scroll {
      height: 100%;
      overflow-y: auto;
      padding: 48px 24px 48px 0;
      max-width: 600px;
      display: flex;
      flex-direction: column;
    }

    /* Title + caption centered together */
    .caption-content {
      margin-top: auto;
      margin-bottom: auto;
    }

    .caption-content .piece-title {
      font-size: 32px;
      font-style: italic;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .caption-content .piece-year {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: #555;
      margin-bottom: 36px;
    }

    .scroll-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, #F5F5F5);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .scroll-fade.hidden { opacity: 0; }

    .caption-text {
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.85;
      color: #111;
    }

    /* ── PORTRAIT ── */
    @media (orientation: portrait) {
      body { height: auto; overflow: auto; }

      .nav { padding: 20px 24px; }

      .content {
        display: flex;
        flex-direction: column;
        padding: 0 24px 48px;
        min-height: unset;
      }

      .slideshow {
        flex: none;
        min-height: unset;
        overflow: visible;
        padding-right: 0;
        padding-top: 28px;
        padding-bottom: 24px;
        gap: 14px;
        border-right: none;
        border-bottom: 1px solid #d9d9d9;
      }

      .video-container {
        flex: none;
        width: 100%;
        max-width: 100%;
      }

      .title-portrait {
        display: block;
        flex-shrink: 0;
        width: 100%;
        margin-bottom: 12px;
      }

      .title-portrait .piece-title {
        font-size: 30px;
        font-style: italic;
        line-height: 1.2;
        margin-bottom: 6px;
      }

      .title-portrait .piece-year {
        font-size: 12px;
        letter-spacing: 0.2em;
        color: #555;
      }

      .caption-panel {
        flex: none;
        min-height: unset;
        padding: 32px 0 0;
      }

      .title-landscape { display: none; }

      .caption-scroll-wrap {
        position: static;
        overflow: visible;
      }

      .caption-scroll {
        height: auto;
        overflow-y: visible;
        padding: 0;
        max-width: 100%;
        display: block;
      }

      .caption-content {
        margin-top: 0;
        margin-bottom: 0;
      }

      .scroll-fade { display: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html#works">&#8592; Works</a>
  </nav>

  <main class="content">

    <section class="slideshow">

      <div class="title-portrait">
        <h1 class="piece-title">Piezo Earring</h1>
        <div class="piece-year">2020</div>
      </div>

      <div class="video-container" id="mediaContainer">
        <video id="mainVideo" controls autoplay muted playsinline>
          <source src="media/Piezo/Piezo1.mp4" type="video/mp4">
        </video>
        <img id="mainImage" src="" alt="" class="media-hidden">
      </div>

      <div class="slide-dots" id="dots"></div>

      <div class="slide-controls">
        <button class="slide-btn" id="prevBtn" disabled>Prev</button>
        <span class="slide-counter" id="counter">1 / 4</span>
        <button class="slide-btn" id="nextBtn">Next</button>
      </div>
    </section>

    <aside class="caption-panel">

      <div class="caption-scroll-wrap">
        <div class="caption-scroll" id="captionScroll">
          <div class="caption-content">
            <div class="title-landscape">
              <h1 class="piece-title">Piezo Earring</h1>
              <div class="piece-year">2020</div>
            </div>
            <p class="caption-text">The Piezo Earring functions as a contact microphone. Insert any 3.5mm audio jack to receive the emitted signal. The implications of the earring aim to encourage active listening as well as introspection.</p>
          </div>
        </div>
        <div class="scroll-fade" id="scrollFade"></div>
      </div>

    </aside>

  </main>

  <script>
    const slides = [
      { type: 'video', src: 'media/Piezo/Piezo1.mp4' },
      { type: 'image', src: 'media/Piezo/Piezo2.jpg' },
      { type: 'image', src: 'media/Piezo/Piezo3.jpg' },
      { type: 'image', src: 'media/Piezo/Piezo4.jpg' },
    ];

    let current = 0;
    let autoCycle = true;
    const video = document.getElementById('mainVideo');
    const img = document.getElementById('mainImage');
    const mediaContainer = document.getElementById('mediaContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const counter = document.getElementById('counter');
    const dotsEl = document.getElementById('dots');
    const controlsEl = document.querySelector('.slide-controls');

    function syncControlsWidth() {
      const w = mediaContainer.offsetWidth;
      if (w > 0) {
        dotsEl.style.width = w + 'px';
        controlsEl.style.width = w + 'px';
      }
    }

    function setAspectRatio(w, h) {
      mediaContainer.style.aspectRatio = `${w} / ${h}`;
      requestAnimationFrame(syncControlsWidth);
    }

    video.addEventListener('loadedmetadata', () => {
      if (video.videoWidth && video.videoHeight) setAspectRatio(video.videoWidth, video.videoHeight);
    });
    if (video.readyState >= 1 && video.videoWidth) setAspectRatio(video.videoWidth, video.videoHeight);
    window.addEventListener('resize', () => requestAnimationFrame(syncControlsWidth));

    slides.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => { autoCycle = false; goTo(i); });
      dotsEl.appendChild(dot);
    });

    function goTo(index) {
      current = index;
      const slide = slides[current];

      if (slide.type === 'video') {
        img.classList.add('media-hidden');
        video.classList.remove('media-hidden');
        video.src = slide.src;
        video.play().catch(() => {});
        video.addEventListener('loadedmetadata', () => {
          if (video.videoWidth && video.videoHeight) setAspectRatio(video.videoWidth, video.videoHeight);
        }, { once: true });
      } else {
        video.pause();
        video.classList.add('media-hidden');
        img.classList.remove('media-hidden');
        img.onload = () => {
          if (img.naturalWidth && img.naturalHeight) setAspectRatio(img.naturalWidth, img.naturalHeight);
        };
        img.src = slide.src;
      }

      update();
    }

    function update() {
      counter.textContent = `${current + 1} / ${slides.length}`;
      prevBtn.disabled = false;
      nextBtn.disabled = false;
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    }

    const captionScroll = document.getElementById('captionScroll');
    const scrollFade = document.getElementById('scrollFade');

    function checkFade() {
      const atBottom = captionScroll.scrollHeight - captionScroll.scrollTop <= captionScroll.clientHeight + 2;
      scrollFade.classList.toggle('hidden', atBottom);
    }

    captionScroll.addEventListener('scroll', checkFade);
    window.addEventListener('resize', checkFade);
    setTimeout(checkFade, 50);

    video.addEventListener('ended', () => {
      if (autoCycle) goTo((current + 1) % slides.length);
    });

    prevBtn.addEventListener('click', () => {
      autoCycle = false;
      goTo((current - 1 + slides.length) % slides.length);
    });

    nextBtn.addEventListener('click', () => {
      autoCycle = false;
      goTo((current + 1) % slides.length);
    });
  </script>
</body>
</html>
